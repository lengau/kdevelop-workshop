name: Debian Package Build & Install Test

on:
  push:
    branches: [ main, debian-packaging ]
  pull_request:
    branches: [ main, debian-packaging ]

jobs:
  build-and-install:
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
            arch: amd64
          - runs-on: ubuntu-24.04-arm64
            arch: arm64
    container:
      image: ubuntu:26.04
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            dpkg-dev \
            debhelper \
            devscripts \
            equivs \
            ca-certificates

      - name: Install build dependencies
        run: |
          mk-build-deps -i -r -t "apt-get -y --no-install-recommends install" debian/control

      - name: Build Debian package
        run: |
          dpkg-buildpackage -us -uc -b

      - name: Test installation
        run: |
          apt-get install -y --no-install-recommends ../kdevelop-workshop_*.deb
